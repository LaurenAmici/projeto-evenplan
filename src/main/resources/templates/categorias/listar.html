<!DOCTYPE html>
<!-- Alunas: Giulia Lain, Isabelle de Oliveira e Lauren Amici -->
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvenPlan – Categorias</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Shrikhand&display=swap" rel="stylesheet">
    <link th:href="@{/css/forms.css}" rel="stylesheet">
</head>
<body>

<nav>
    <a th:href="@{/}" class="logo">EvenPlan</a>
    <span class="nav-credit">Desenvolvido por Giulia, Isabelle e Lauren</span>
</nav>

<div class="form-wrapper">
    <div class="form-card">
        <h1 class="page-title">Categorias</h1>

        <div class="grid-categorias">
            <a th:each="cat : ${categorias}"
               th:href="@{/categorias/editar/{id}(id=${cat.id})}"
               class="btn-categoria-item">
                <span th:text="${cat.nome}">Categoria</span>
                <span>✏️</span>
            </a>
        </div>
        <p class="sem-categorias" th:if="${#lists.isEmpty(categorias)}">
            Nenhuma categoria cadastrada ainda.
        </p>

        <div class="acoes-form">
            <div class="linha-botoes">
                <a th:href="@{/categorias/nova}" class="btn-salvar">＋ Nova categoria</a>
                <a th:href="@{/eventos}" class="btn-cancelar">Voltar</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
